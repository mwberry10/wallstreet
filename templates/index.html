<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,
    initial-scale=1.0">
    <title>Wallstreet Conditions</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <h1>Wallstreet Conditions</h1>
    <div style="position: relative; display: inline-block;">
      <input type="text" id="ticker-input" placeholder="Enter ticker (e.g. AAPL)" autocomplete="off">
      <div id="suggestions" style="position: absolute; background: white; border: 1px solid #ccc; width: 100%; display: none; z-index: 10;"></div>
    </div>
      <button onclick="lookupStock()">Look up</button>
      <div id="stock-result"></div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    
</body>
</html>
